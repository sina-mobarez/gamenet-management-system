{% extends 'base.html' %}
{% block title %}تأیید حذف{% endblock %}
{% block content %}
<div class="page-header">
  <h2>تأیید حذف</h2>
</div>
<div class="card p-4 fade-in" style="max-width:440px;border-color:rgba(244,63,94,0.3)">
  <div style="position:absolute;top:0;right:0;left:0;height:2px;background:var(--grad-pink);border-radius:var(--radius) var(--radius) 0 0"></div>
  <div class="d-flex align-items-center gap-3 mb-4">
    <div style="width:48px;height:48px;background:rgba(244,63,94,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🗑️</div>
    <div>
      <div style="font-weight:700;font-size:1rem">آیا مطمئن هستید؟</div>
      <div style="color:var(--text-3);font-size:.85rem">این عملیات قابل بازگشت نیست.</div>
    </div>
  </div>
  <div class="p-3 rounded-3 mb-4" style="background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.2)">
    <strong style="color:var(--neon-red)">{{ object_name }}</strong>
    <span style="color:var(--text-2)"> حذف می‌شود.</span>
  </div>
  <div class="d-flex gap-2">
    <form method="post" class="flex-fill">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger w-100">بله، حذف شود</button>
    </form>
    <a href="{{ cancel_url }}" class="btn btn-outline-secondary flex-fill">انصراف</a>
  </div>
</div>
{% endblock %}
