{% load shamsi %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود - گیم‌نت</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');
  body { background: #0f1117; color: #e2e8f0; font-family: 'Vazirmatn', sans-serif; min-height: 100vh; }
  .card { background: #1a1d27; border: 1px solid rgba(255,255,255,.07); border-radius: 14px; }
  .form-control { background: #242736 !important; border-color: rgba(255,255,255,.12) !important; color: #e2e8f0 !important; }
  .form-control:focus { border-color: #6c63ff !important; box-shadow: 0 0 0 .2rem rgba(108,99,255,.2) !important; }
  .btn-primary { background: #6c63ff; border-color: #6c63ff; }
  .btn-primary:hover { background: #5a52d0; border-color: #5a52d0; }
  label { color: #94a3b8; font-size: .85rem; }
</style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div style="width:360px">
  <div class="text-center mb-4">
    <h2 style="color:#6c63ff;font-weight:800;font-size:2rem">🎮 گیم‌نت</h2>
    <p class="text-muted">سیستم مدیریت مرکز بازی</p>
  </div>
  <div class="card p-4">
    {% for message in messages %}
    <div class="alert alert-danger alert-sm py-2 small">{{ message }}</div>
    {% endfor %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">نام کاربری</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">رمز عبور</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ورود</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
