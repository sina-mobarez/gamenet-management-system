{% load shamsi %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود — GameNet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
body {
  margin: 0;
  min-height: 100vh;
  background: #04040a;
  font-family: 'Vazirmatn', sans-serif;
  color: #e8e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(168,85,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  animation: gridScroll 20s linear infinite;
}
@keyframes gridScroll {
  to { background-position: 50px 50px; }
}

/* Glow blobs */
.blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
.blob1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 70%);
  top: -100px; right: -100px;
  animation: float1 10s ease-in-out infinite;
}
.blob2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
  bottom: -80px; left: -80px;
  animation: float2 12s ease-in-out infinite;
}
.blob3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(236,72,153,0.1), transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: float3 8s ease-in-out infinite;
}
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,40px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }
@keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.3)} }

/* Login card */
.login-wrap { width: 420px; position: relative; z-index: 1; padding: 1rem; }

.login-card {
  background: rgba(10,10,25,0.85);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 20px;
  padding: 2.5rem;
  border: 1px solid rgba(168,85,247,0.2);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(124,58,237,0.1);
  position: relative;
  overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0; left: 0;
  height: 2px;
  background: linear-gradient(90deg, #7c3aed, #ec4899, #06b6d4);
}

.login-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  margin: 0 auto 1.5rem;
  box-shadow: 0 8px 32px rgba(124,58,237,0.5);
  animation: iconFloat 4s ease-in-out infinite;
}
@keyframes iconFloat {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}
}

.brand-name {
  font-family: 'Oxanium', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, #a855f7, #ec4899, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: .3rem;
  letter-spacing: 2px;
}
.brand-sub {
  text-align: center;
  color: #5a5a80;
  font-size: .8rem;
  margin-bottom: 2rem;
}

.form-control {
  background: rgba(255,255,255,0.04) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  color: #e8e8f0 !important;
  border-radius: 10px !important;
  padding: .75rem 1rem;
  font-family: 'Vazirmatn', sans-serif;
  transition: all .2s;
}
.form-control:focus {
  border-color: rgba(168,85,247,.6) !important;
  box-shadow: 0 0 0 3px rgba(168,85,247,.15) !important;
  background: rgba(168,85,247,.05) !important;
}
.form-control::placeholder { color: #3a3a60 !important; }
.form-label { color: #7070a0; font-size: .8rem; font-weight: 500; margin-bottom: .4rem; }

.btn-login {
  width: 100%;
  padding: .85rem;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Vazirmatn', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 6px 24px rgba(124,58,237,0.4);
  letter-spacing: .5px;
  position: relative;
  overflow: hidden;
}
.btn-login::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #ec4899, #06b6d4);
  opacity: 0;
  transition: opacity .3s;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(124,58,237,0.55); }
.btn-login:hover::after { opacity: 1; }
.btn-login span { position: relative; z-index: 1; }

.alert { border-radius: 10px; font-size: .83rem; margin-bottom: 1.25rem; }
.alert-danger {
  background: rgba(244,63,94,0.1);
  border: 1px solid rgba(244,63,94,0.3);
  color: #fb7185;
}

.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: rgba(168,85,247,0.6);
  border-radius: 50%;
  animation: particleFly linear infinite;
}
@keyframes particleFly {
  0%   { transform: translateY(100vh) translateX(0); opacity: 1; }
  100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="particles" id="particles"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🎮</div>
    <div class="brand-name">GAMENET</div>
    <div class="brand-sub">سیستم مدیریت مرکز بازی</div>

    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">نام کاربری</label>
        <input type="text" name="username" class="form-control" autofocus required
               placeholder="admin">
      </div>
      <div class="mb-4">
        <label class="form-label">رمز عبور</label>
        <input type="password" name="password" class="form-control" required
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login"><span>ورود به سیستم</span></button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Floating particles
const container = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    animation-duration: ${6 + Math.random()*10}s;
    animation-delay: ${Math.random()*8}s;
    width: ${1 + Math.random()*2}px;
    height: ${1 + Math.random()*2}px;
    opacity: ${0.3 + Math.random()*0.7};
    background: hsl(${260 + Math.random()*80},80%,70%);
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
