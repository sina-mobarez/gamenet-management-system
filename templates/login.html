{% load shamsi static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود — GameNet</title>
<link href="{% static 'css/fonts.css' %}" rel="stylesheet">
<link href="{% static 'css/bootstrap.rtl.min.css' %}" rel="stylesheet">
<link href="{% static 'css/bootstrap-icons.css' %}" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; }

body {
  min-height: 100vh;
  background: #03020c;
  font-family: 'Vazirmatn', sans-serif;
  color: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* Static Grid BG (Optimized: Removed animation) */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Scan lines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 6px);
  pointer-events: none; z-index: 100;
}

/* Orbs (Optimized: Removed blur filter, replaced with native gradients) */
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb1 { width: 900px; height: 900px; background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 60%); top: -300px; right: -300px; }
.orb2 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 60%); bottom: -200px; left: -200px; }
.orb3 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(236,72,153,0.06) 0%, transparent 60%); top: 50%; left: 45%; transform: translate(-50%,-50%); }

/* Main wrap */
.login-wrap {
  width: 100%; max-width: 440px;
  padding: 1.5rem; position: relative; z-index: 10;
}

/* Card */
.login-card {
  background: rgba(8,5,22,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 2.75rem 2.5rem;
  border: 1px solid rgba(124,58,237,0.25);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(124,58,237,0.1);
  position: relative; overflow: hidden;
  animation: cardIn .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(.98)} to{opacity:1;transform:none} }

/* Rainbow top border (Kept, as background-position is relatively cheap) */
.login-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #7c3aed, #ec4899, #06b6d4, #7c3aed);
  background-size: 200% 100%;
  animation: borderRun 4s linear infinite;
}
@keyframes borderRun { from{background-position:0% 0} to{background-position:200% 0} }

/* Icon (Optimized: Removed blur animation) */
.login-icon {
  width: 76px; height: 76px;
  background: linear-gradient(135deg, #6d28d9, #7c3aed, #a855f7);
  border-radius: 22px; margin: 0 auto 1.5rem;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  box-shadow: 0 8px 25px rgba(124,58,237,0.4);
  position: relative;
}

/* Brand */
.brand-name {
  font-family: 'Oxanium', sans-serif;
  font-size: 2rem; font-weight: 900;
  background: linear-gradient(135deg, #c4b5fd, #ec4899 50%, #67e8f9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center; margin-bottom: .25rem;
  letter-spacing: 4px;
}
.brand-sub {
  text-align: center; color: #4b5563; font-size: .78rem;
  margin-bottom: 2.25rem; letter-spacing: .5px;
}

/* Fields */
.field-wrap { margin-bottom: 1.25rem; }
.field-label { color: #6b7280; font-size: .78rem; font-weight: 600; margin-bottom: .5rem; letter-spacing: .5px; display: block; }
.field-input {
  width: 100%; padding: .8rem 1rem;
  background: rgba(255,255,255,0.035) !important;
  border: 1px solid rgba(124,58,237,0.2) !important;
  color: #f1f5f9 !important;
  border-radius: 12px !important; font-family: 'Vazirmatn', sans-serif;
  font-size: .9rem; transition: all .2s; outline: none;
}
.field-input:focus {
  border-color: #7c3aed !important;
  background: rgba(124,58,237,0.06) !important;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.18) !important;
}
.field-input::placeholder { color: #2d2d50 !important; }

/* Submit */
.btn-login {
  width: 100%; padding: .9rem 1rem; margin-top: .75rem;
  background: linear-gradient(135deg, #6d28d9, #7c3aed);
  border: none; border-radius: 12px;
  color: #fff; font-family: 'Vazirmatn', sans-serif;
  font-size: .95rem; font-weight: 700; cursor: pointer;
  letter-spacing: .5px;
  box-shadow: 0 4px 15px rgba(124,58,237,0.3);
  transition: all .2s;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }

/* Error */
.login-error {
  background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3);
  border-radius: 10px; color: #fda4af; padding: .75rem 1rem;
  font-size: .83rem; margin-bottom: 1.25rem;
}

/* Version tag */
.version-tag {
  text-align: center; margin-top: 1.5rem;
  color: rgba(75,85,99,.6); font-size: .68rem;
  font-family: 'Oxanium', sans-serif; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🎮</div>
    <div class="brand-name">GAMENET</div>
    <div class="brand-sub">سیستم مدیریت مرکز بازی &nbsp;·&nbsp; MANAGEMENT SYSTEM</div>

    {% for message in messages %}
    <div class="login-error"><i class="bi bi-exclamation-circle me-2"></i>{{ message }}</div>
    {% endfor %}

    <form method="post" autocomplete="off">
      {% csrf_token %}
      <div class="field-wrap">
        <label class="field-label">نام کاربری</label>
        <input type="text" name="username" class="field-input" autofocus required placeholder="admin">
      </div>
      <div class="field-wrap">
        <label class="field-label">رمز عبور</label>
        <input type="password" name="password" class="field-input" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login"><span>ورود به سیستم ←</span></button>
    </form>

    <div class="version-tag">GAMENET Manager &nbsp;●&nbsp; Developed BY Sina Mobarez</div>
  </div>
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
