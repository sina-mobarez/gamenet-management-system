{% extends 'base.html' %}
{% block title %}ویرایش {{ product.name }}{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{% url 'products_manage' %}" class="btn btn-outline-secondary btn-sm mb-2">← محصولات</a>
  <h2>ویرایش: {{ product.name }}</h2>
</div>
<div class="card p-4 fade-in" style="max-width:500px;border-color:rgba(168,85,247,.2)">
  <div style="position:absolute;top:0;right:0;left:0;height:2px;background:var(--grad-main);border-radius:var(--radius) var(--radius) 0 0"></div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">نام *</label>
      <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
    </div>
    <div class="row g-2 mb-3">
      <div class="col">
        <label class="form-label">قیمت (تومان)</label>
        <input type="number" name="price" class="form-control ltr" step="1000" min="0"
               value="{{ product.price }}" required>
      </div>
      <div class="col">
        <label class="form-label">موجودی</label>
        <input type="number" name="stock" class="form-control ltr" step="1" min="0"
               value="{{ product.stock }}">
      </div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col">
        <label class="form-label">دسته‌بندی</label>
        <select name="category_id" class="form-select">
          <option value="">— بدون دسته —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col">
        <label class="form-label">هشدار موجودی</label>
        <input type="number" name="low_stock_threshold" class="form-control ltr" min="0"
               value="{{ product.low_stock_threshold }}">
      </div>
    </div>
    <div class="form-check form-switch mb-4">
      <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
             {% if product.is_active %}checked{% endif %}>
      <label class="form-check-label" for="isActive">محصول فعال است</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">ذخیره</button>
      <a href="{% url 'products_manage' %}" class="btn btn-outline-secondary">انصراف</a>
    </div>
  </form>
</div>
{% endblock %}
