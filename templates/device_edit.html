{% extends 'base.html' %}
{% block title %}ویرایش {{ device.name }}{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{% url 'devices_manage' %}" class="btn btn-outline-secondary btn-sm mb-2">← دستگاه‌ها</a>
  <h2>ویرایش: {{ device.name }}</h2>
</div>
<div class="card p-4 fade-in" style="max-width:500px;border-color:rgba(168,85,247,.2)">
  <div style="position:absolute;top:0;right:0;left:0;height:2px;background:var(--grad-main);border-radius:var(--radius) var(--radius) 0 0"></div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">نام</label>
      <input type="text" name="name" class="form-control" value="{{ device.name }}" required></div>
    <div class="row g-2 mb-3">
      <div class="col"><label class="form-label">نرخ پایه (تومان/ساعت)</label>
        <input type="number" name="price_per_hour" class="form-control ltr" step="1000" value="{{ device.price_per_hour }}" required></div>
      <div class="col"><label class="form-label">کنترلر پایه</label>
        <input type="number" name="included_controllers" class="form-control ltr" value="{{ device.included_controllers }}" min="0"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">اضافه به نرخ/کنترلر اضافه (تومان/ساعت)</label>
      <input type="number" name="extra_controller_price" class="form-control ltr" step="1000" value="{{ device.extra_controller_price }}">
      <div style="font-size:.72rem;color:var(--text-3);margin-top:.25rem">اضافه به نرخ ساعتی (نه یکجا)</div>
    </div>
    <div class="form-check form-switch mb-4">
      <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
             {% if device.is_active %}checked{% endif %}>
      <label class="form-check-label" for="isActive">دستگاه فعال است</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">ذخیره</button>
      <a href="{% url 'devices_manage' %}" class="btn btn-outline-secondary">انصراف</a>
      <a href="{% url 'device_delete' device.pk %}" class="btn btn-outline-danger ms-auto">
        <i class="bi bi-trash3 me-1"></i>حذف دستگاه
      </a>
    </div>
  </form>
</div>
{% endblock %}
